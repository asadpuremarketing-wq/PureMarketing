<!doctype html>
<html lang="en-CA">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── SEO Essentials ── -->
    <title>Local Business Growth Authority | GTA's Premier Revenue Strategists</title>
    <meta name="description" content="The GTA's most strategic growth partners for local businesses. We engineer revenue systems, not vanity metrics." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://yourdomain.com/" />

    <!-- ── Open Graph ── -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Local Business Growth Authority" />
    <meta property="og:description" content="The GTA's most strategic growth partners for local businesses." />
    <meta property="og:url"         content="https://yourdomain.com/" />
    <meta property="og:image"       content="https://yourdomain.com/og-image.jpg" />
    <meta property="og:locale"      content="en_CA" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Local Business Growth Authority" />
    <meta name="twitter:description" content="The GTA's most strategic growth partners for local businesses." />
    <meta name="twitter:image"       content="https://yourdomain.com/og-image.jpg" />

    <!-- ── Favicon ── -->
    <link rel="icon"             type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180"      href="/apple-touch-icon.png" />

    <!-- ── Plus Jakarta Sans — preconnect first, then stylesheet ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
    />

    <!-- ── Theme color (browser chrome on mobile) ── -->
    <meta name="theme-color" content="#0a0a0a" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
